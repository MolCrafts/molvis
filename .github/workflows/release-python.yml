name: "Release: Python (PyPI)"

on:
  push:
    tags: ["v*"]
  # Manual re-trigger to republish after a workflow fix, without re-tagging.
  workflow_dispatch:

jobs:
  publish:
    name: Build & publish Python package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publisher (OIDC)

    steps:
      - uses: actions/checkout@v4

      # No `cache: npm` — the repo intentionally does not commit a lockfile
      # (see ci.yml). setup-node's npm cache requires one and would fail.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: npm install

      - name: Build page bundle → python/src/molvis/dist/
        run: npm run build:page

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python wheel
        run: pip install hatchling && python -m hatchling build
        working-directory: python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
